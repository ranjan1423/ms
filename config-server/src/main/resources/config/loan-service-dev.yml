spring:
  datasource:
    url: jdbc:mysql://localhost:3306/loan_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

build-info:
  environment: "dev"
  version: "loan-service : 1.1.2"
  features: "create loan ac for user, modify locan ac data for user, delete loan ac of user"

# discovery server configuration.
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/