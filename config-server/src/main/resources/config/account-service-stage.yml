spring:
  datasource:
    url: jdbc:mysql://as-db:3306/account_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

build-info:
  environment: "stage"
  version: "account-service : 1.1.1"
  features: "create an account for user, modify account data for user, delete account of user"

# discovery server configuration.
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://eureka-server:8070/eureka/
