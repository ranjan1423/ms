spring:
  datasource:
    url: jdbc:mysql://localhost:3306/card_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

build-info:
  environment: "dev"
  version: "card-service : 1.1.2"
  features: "create an card for user, modify card data for user, delete card of user"

# discovery server configuration.
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/