spring:
  datasource:
    url: jdbc:mysql://cs-db:3306/card_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

build-info:
  environment: "stage"
  version: "card-service : 1.1.1"
  features: "create an card for user, modify card data for user, delete card of user"

# discovery server configuration.
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://eureka-server:8070/eureka/