server:
  port: 8081

spring:

  application:
    name: account-service

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root   #{cipher}daa0f8ba315f49a24aad6acbbed100dd98bc456722507698029210fbd61af3db

  ##################################################
  # JPA Properties
  ##################################################
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

##################################################
# Actuator Properties
##################################################
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      probes:
        enabled: true

    # used for graceful shutdown using : http://{{service-name}}/actuator/shutdown
    shutdown:
      access: unrestricted

  # actuator/health : http://{{service-name}}/actuator/health
  health:
    ping:
      enabled: true
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

  # enable ifo for actuator/info
  info:
    env:
      enabled: true

# actuator/info : http://{{service-name}}/actuator/info
info:
  app:
    name: "accounts"
    description: "Accounts application"

# enabling logging for Debug
logging:
  level:
    com:
      ms:
        account: DEBUG