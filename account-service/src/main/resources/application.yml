server:
  port: 8081

spring:

  application:
    name: account-service

  profiles:
    active: dev

  config:
    import: "optional:configserver:http://localhost:8071/"

  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 10
        multiplier: 2

  datasource:
    url: jdbc:mysql://localhost:3306/account_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root   #{cipher}daa0f8ba315f49a24aad6acbbed100dd98bc456722507698029210fbd61af3db

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
